name = "zmailr"
main = "worker/src/index.ts"

# 打包配置
minify = true # 生产环境压缩代码
compatibility_flags = [ "nodejs_compat" ]
compatibility_date = "2025-03-01"
keep_vars = true

# 启用 D1 数据库
# 注意：这里的 binding 是固定的 "DB"，database_name 和 database_id 将由 GitHub Action 动态替换
[[d1_databases]]
binding = "DB"
database_name = "${D1_DATABASE_NAME}"  # 这是 D1 数据库名称的占位符
database_id = "${D1_DATABASE_ID}"      # 这是 D1 数据库 ID 的占位符

# R2 bucket for inbound email attachments (create in Cloudflare dashboard; see docs/deploy.md)
[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "zmailr-attachments"
preview_bucket_name = "zmailr-attachments"

# 设置域名
# 注意：这里的 VITE_EMAIL_DOMAIN 将由 GitHub Action 动态替换
[vars]
VITE_EMAIL_DOMAIN = "${VITE_EMAIL_DOMAIN}"   # 这是邮箱域名的占位符
MAIL_DOMAIN = "${VITE_EMAIL_DOMAIN}"         # 发信/API 使用的域名，默认同 VITE_EMAIL_DOMAIN
ADMIN_PASSWORD = "${ADMIN_PASSWORD}"         # 管理后台密码，部署时通过 secret 注入
ADMIN_PATH = "${ADMIN_PATH}"                 # 管理后台 URL 路径段（UUID，无 leading slash）；生产环境必填
TURNSTILE_SITE_KEY = "${TURNSTILE_SITE_KEY}" # 可选：Cloudflare Turnstile 站点公钥（与 secret 配对后启用注册人机验证）
# CORS_ALLOWED_ORIGINS = "https://app.example.com"  # 可选：额外浏览器 Origin，逗号分隔

# 配置邮件处理
[triggers]
crons = ["0 * * * *"]  # 每小时运行一次清理任务

[build]
command = "pnpm run build"

[assets]
binding = "ASSETS"
directory = "frontend/dist"
not_found_handling = "single-page-application"

# 默认开启日志，方便调试
[observability]
enabled = false
head_sampling_rate = 1 # optional. default = 1.
